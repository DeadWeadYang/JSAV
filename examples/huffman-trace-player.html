<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Huffman Trace Player</title>
    <link rel="stylesheet" href="../css/JSAV.css" type="text/css" />
    <style>
      body {
        margin: 12px;
        font-family: Consolas, "Courier New", monospace;
      }
      #toolbar {
        margin: 8px 0;
      }
      #traceInput {
        width: 100%;
        min-height: 180px;
        box-sizing: border-box;
      }
      #av {
        margin-top: 10px;
        min-height: 560px;
        border: 1px solid #d4d4d8;
        padding: 8px;
        position: relative;
      }
      .dstrace-context-panel {
        border: 1px solid #e4e4e7;
        margin: 10px 0;
        padding: 8px;
      }
      .dstrace-context-title {
        font-weight: 700;
        margin-bottom: 6px;
      }
      .jsavcounter {
        position: absolute;
        top: 10px;
      }
      #status {
        margin-left: 10px;
        color: #334155;
      }
    </style>
  </head>
  <body>
    <h2>Huffman Trace Player</h2>
    <div id="toolbar">
      <button id="loadDefault">Load traces/trace.btree.tmp.jsonl</button>
      <button id="play">Play</button>
      <span id="status"></span>
    </div>
    <textarea id="traceInput" placeholder="Paste JSONL trace here..."></textarea>
    <div id="av"></div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.4/jquery-ui.min.js"></script>
    <script src="../lib/jquery.transit.js"></script>
    <script src="../lib/raphael.js"></script>
    <script src="../build/JSAV.js"></script>
    <script src="../ext/bug_fix.js"></script>
    <script src="../ext/binary_tree_rotation.js"></script>
    <script src="../ext/ds_trace_player.js"></script>
    <script>
      var DEFAULT_TRACE_PATH = "./traces/trace.btree.tmp.jsonl";

      function setStatus(msg) {
        document.getElementById("status").textContent = msg || "";
      }

      function loadDefaultTrace() {
        setStatus("Loading...");
        return fetch(DEFAULT_TRACE_PATH)
          .then(function (res) {
            if (!res.ok) {
              throw new Error("HTTP " + res.status + " while loading " + DEFAULT_TRACE_PATH);
            }
            return res.text();
          })
          .then(function (text) {
            document.getElementById("traceInput").value = text;
            setStatus("Loaded default trace.");
          })
          .catch(function (err) {
            setStatus("Load failed: " + err.message);
          });
      }

      function playTrace() {
        try {
          var text = document.getElementById("traceInput").value;
          var events = parseDSTraceJSONL(text);
          document.getElementById("av").innerHTML = "";
          playDSTrace(document.getElementById("av"), events);
          setStatus("Played " + events.length + " events.");
        } catch (e) {
          setStatus("Play failed: " + e.message);
          alert(e.message);
        }
      }

      document.getElementById("loadDefault").addEventListener("click", loadDefaultTrace);
      document.getElementById("play").addEventListener("click", playTrace);
      loadDefaultTrace();
    </script>
  </body>
  </html>
