<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DSA Visual Code Trace Demo</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 20px;
      }
    </style>
  </head>
  <body>
    <dsa-trace-player
      title="Showcase Trace with Code"
      src="./traces/trace.showcase.tmp.jsonl"
      assets-base="../"
      source-base="../../"
      code-trace="true"
      graph-layout="auto_freeze"
      animation-speed="150"
      height="720"
      toolbar="true">
    </dsa-trace-player>

    <script src="../ext/dsa_visual_component.js"></script>
  </body>
</html>
