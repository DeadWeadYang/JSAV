<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DSA Visual Component API Demo</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 20px;
      }

      #player {
        max-width: 1120px;
      }
    </style>
  </head>
  <body>
    <div id="player"></div>

    <script src="../ext/dsa_visual_component.js"></script>
    <script>
      DSAVisual.mount("#player", {
        title: "Showcase Trace via JS API",
        src: "./traces/trace.showcase.tmp.jsonl",
        assetsBase: "../",
        graphLayout: "auto_freeze",
        animationSpeed: 150,
        height: 720,
        showToolbar: true
      });
    </script>
  </body>
</html>
